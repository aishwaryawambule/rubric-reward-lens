name: Publish to PyPI

# Publishes to PyPI when you publish a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
#
# One-time PyPI setup (https://pypi.org → your project → Publishing):
#   - Owner:            <your github user/org>
#   - Repository name:  rubric-reward-lens   (or your repo name)
#   - Workflow name:    publish.yml
#   - Environment:      pypi
# For the very first upload, register the project name or use the
# "pending publisher" flow before the project exists on PyPI.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
