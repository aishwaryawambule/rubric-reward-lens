name: general-helpfulness
criteria:
  - id: addresses_question
    text: directly addresses and answers the question that was asked
    weight: 2.0
    polarity: include
  - id: accurate
    text: provides accurate and correct information
    weight: 2.0
    polarity: include
  - id: detailed
    text: includes relevant supporting detail, steps, or examples
    weight: 1.0
    polarity: include
  - id: not_evasive
    text: refuses or deflects without answering
    weight: 1.0
    polarity: avoid
